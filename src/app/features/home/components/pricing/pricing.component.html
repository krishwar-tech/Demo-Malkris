<div class="section-wrap" id="pricing">
  <div class="pricing-center">
    <p class="section-label">Pricing</p>
    <h2 class="section-title">Flexible plans for every stage</h2>

    <div class="pricing-toggle">
      <button class="toggle-btn" [class.active]="!isAnnual" (click)="toggle('monthly')">
        Monthly
      </button>

      <button class="toggle-btn" [class.active]="isAnnual" (click)="toggle('annual')">
        Annual
      </button>
    </div>
  </div>

  <div class="pricing-grid">
    <div class="price-card" *ngFor="let plan of plans" [class.featured]="plan.featured">
      <div class="price-plan">{{ plan.name }}</div>

      <div class="price-amount">${{ isAnnual ? plan.annual : plan.monthly }}</div>

      <div class="price-period">per month</div>

      <ul class="price-features">
        <li class="price-feature" *ngFor="let f of plan.features">
          {{ f }}
        </li>
      </ul>

      <button class="price-btn">Get Started</button>
    </div>
  </div>
</div>
